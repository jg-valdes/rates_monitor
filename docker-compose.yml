services:

  # ── Django app — gunicorn + django-crontab (single container) ───────────────
  web:
    build: .
    image: rates_app:web
    container_name: rates_web
    restart: unless-stopped
    env_file: .env
    environment:
      DATA_DIR: /app/data
    volumes:
      - data:/app/data
    ports:
      # Bound to localhost only so the port is not exposed directly to the
      # internet. A reverse proxy (e.g. Caddy) running on the host reaches
      # the app at localhost:8003.
      - "8003:8000"

volumes:
  data:   # persistent SQLite database
